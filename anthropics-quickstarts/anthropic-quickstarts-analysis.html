<script id="src-recit" type="text/markdown">
# NARRATIVE — anthropics-quickstarts

Si Anthropic devait montrer à un dev "comment on démarre un projet chez nous", c'est ce repo qu'on lui tend. Sept quickstarts, chacun pose une question différente.

`agents/` répond à : "qu'est-ce qu'un agent au minimum ?" Réponse : 300 lignes, une classe Agent, une boucle, des outils enfichables. Pas de framework, pas de magie. C'est la version Hello-World de l'agent — exactement ce qu'un débutant doit lire en premier.

`computer-use-demo/` répond à : "comment je laisse Claude piloter une machine sans qu'il casse la mienne ?" Réponse : Docker, VNC, isolation totale. Containerisation comme garde-fou.

`computer-use-best-practices/` répond à la même question mais sans le filet : macOS natif, mais avec sandbox-exec, prompt caching, image pruning, trajectory recording. C'est le seul du repo à porter un dossier `.claude/skills/first-run/` — Anthropic montre ici comment intégrer ses propres skills dans un projet user.

`browser-use-demo/` répond à : "et si je veux juste le web, pas le bureau ?" Réponse : Playwright + Streamlit. DOM-aware, moins risqué que le pilotage pixel.

`autonomous-coding/` répond à la question la plus ambitieuse : "comment un agent peut-il construire une app sur plusieurs jours, plusieurs sessions, sans tout oublier entre deux ?" Réponse : git comme mémoire long-terme, `feature_list.json` comme source de vérité immuable, `claude-progress.txt` comme passation entre sessions. C'est littéralement le pattern PWF (Planning With Files) d'origine Anthropic. Le contexte volatile devient persistance disque.

`customer-support-agent/` et `financial-data-analyst/` répondent à : "comment je montre ça à mon CTO ?" Réponse : Next.js 14, shadcn/ui, démo léchée, déploiement Amplify.

Le pattern transverse — celui qu'Anthropic veut qu'on retienne — est la **discipline de la friction minimale** : chaque quickstart est démarrable en trois commandes (`install`, `set API key`, `run`), chacun a son README autonome, chacun isole son scope. Aucun couplage entre projets. Si tu veux faire ton propre quickstart conforme : un dossier, un README qui suit la même charpente, un SDK target unique, un init script clair, un `.env.example` versionné, un sandbox quand tu touches au système.
</script>

<script id="src-fmath" type="text/markdown">
# FMATH — anthropics/anthropic-quickstarts

Analyse formelle 8-couches du repo en tant que "système de templates de démarrage Anthropic".

## C1 — Objets

- **Quickstart** : projet isolé, autonome, démarrable indépendamment des autres
- **README** : porte d'entrée obligatoire de chaque quickstart
- **SDK target** : `anthropic` (Python), `@anthropic-ai/sdk` (TS), `claude-code-sdk` (autonomie), `mcp` (tooling externe)
- **API key gate** : `ANTHROPIC_API_KEY` env var (jamais en clair, jamais en fichier versionné)
- **Tool loop** : motif fondamental "LLM + tools in a loop" (formalisé dans `agents/`)
- **Trajectory** : enregistrement structuré des interactions (computer-use-best-practices)

## C2 — Relations

- README racine → README quickstart (1:N catalogage)
- Quickstart → SDK (1:1 dépendance principale)
- Quickstart → API key (1:1 gating)
- Agent → tools (1:N composition)
- Session N → Session N+1 via persistance disque (git + JSON + .txt)

## C3 — Invariants

**I1 — Isolation** : chaque quickstart démarrable sans toucher aux autres. Pas de cross-import.
**I2 — Minimum viable README** : titre + prerequisites + quickstart command + API key setup + structure + license.
**I3 — Secrets jamais versionnés** : `.env.example` versionné, `.env` dans `.gitignore`.
**I4 — Standalone first, container second** : version locale fonctionnelle avant Dockerfile.
**I5 — Tool loop centralisé** : un seul fichier orchestre `client.messages.create` + tool dispatch.

## C4 — Tensions

- **Minimalisme pédagogique vs production-ready** : résolue par doublon explicite (computer-use-demo = démo / computer-use-best-practices = pédagogique avec caching, pruning, sandbox)
- **Python vs TypeScript** : non choisie — coexistence assumée selon le cas d'usage (UI web → TS Next.js ; agent CLI → Python)
- **Dockerisé vs natif** : computer-use propose les deux ; autonomous-coding et best-practices restent natifs

## C5 — Topologie

DAG en étoile : README.md racine est la racine, chaque quickstart est une feuille indépendante. Pas d'arête entre feuilles. CLAUDE.md racine est une note transverse (instructions développeurs).

## C6 — Dynamique

Évolution observable : ajout incrémental de quickstarts (autonomous-coding et computer-use-best-practices sont les plus récents). Pattern d'archi qui se stabilise : `.claude/skills/` apparaît pour la première fois dans computer-use-best-practices → signal faible que les futurs quickstarts auront `.claude/skills/<topic>/SKILL.md`.

## C7 — Frontières

**Dans le périmètre** : structure projet, README, init scripts, security model, persistance session.
**Hors périmètre** : prompt engineering détaillé, fine-tuning, déploiement production cloud (sauf customer-support-agent → AWS Amplify).

## C8 — Verdict structurel

Repo cohérent, modulaire, sans dette architecturale visible. Le `.claude/skills/first-run/SKILL.md` dans computer-use-best-practices est le seul exemple **officiel Anthropic** d'un skill au sein d'un projet user — c'est la référence canonique pour produire un template de skill conforme.

<script id="src-install" type="text/markdown">
# INSTALL — anthropics-quickstarts

Guide d'installation factorisé pour les 7 quickstarts.

## Prérequis communs

- **Anthropic API key** : https://console.anthropic.com → générer une clé → `export ANTHROPIC_API_KEY='sk-ant-...'`
- **Git** : pour cloner
- **Python 3.11+** ou **Node 18+** selon le quickstart

## Clone du repo

````bash
git clone https://github.com/anthropics/anthropic-quickstarts.git
cd anthropic-quickstarts
````

## Par quickstart

### agents/

````bash
cd agents
pip install anthropic mcp
jupyter notebook agent_demo.ipynb
````

### autonomous-coding/

````bash
cd autonomous-coding
npm install -g @anthropic-ai/claude-code  # CLI requis
pip install -r requirements.txt
python autonomous_agent_demo.py --project-dir ./my_project --max-iterations 3
````

Avertissement : durée totale plusieurs heures pour 200 features. Réduire dans `prompts/initializer_prompt.md` pour démo rapide.

### browser-use-demo/

````bash
cd browser-use-demo
cp .env.example .env
# éditer .env avec ANTHROPIC_API_KEY
docker-compose up
````

### computer-use-best-practices/

````bash
cd computer-use-best-practices
python3.11 -m venv .venv
source .venv/bin/activate
pip install -r requirements.txt
playwright install chromium
cp .env.example .env  # ajouter ANTHROPIC_API_KEY
python -m computer_use "open TextEdit and type hello world"
````

macOS uniquement. Screen Recording + Accessibility permissions requises. VM fortement recommandée.

Mode browser-only (sans contrôle bureau) :
````bash
CU_ENABLE_COMPUTER_USE_TOOLS=false python -m computer_use "..."
````

### computer-use-demo/

````bash
cd computer-use-demo
./setup.sh
docker build -t computer-use-demo .
docker run -e ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY -p 8080:8080 computer-use-demo
````

### customer-support-agent/

````bash
cd customer-support-agent
npm install
cp .env.example .env.local  # ajouter ANTHROPIC_API_KEY + BAWS_* (AWS Bedrock)
npm run dev
# http://localhost:3000
````

### financial-data-analyst/

````bash
cd financial-data-analyst
npm install
echo "ANTHROPIC_API_KEY=..." > .env.local
npm run dev
# http://localhost:3000
````

## Vérification

Après installation, chaque quickstart doit afficher une réponse Claude en moins d'une minute (sauf autonomous-coding : plusieurs minutes pour la première session).

## Troubleshooting global

- **"API key not set"** : `echo $ANTHROPIC_API_KEY` doit retourner ta clé
- **macOS Python 3.9** : incompatible. Installer 3.11+ via `brew install python@3.11`
- **Docker permission denied** : ajouter user au groupe docker (`sudo usermod -aG docker $USER`, relog)

### Adaptation Windows PowerShell

````powershell
$env:ANTHROPIC_API_KEY = 'sk-ant-...'
git clone https://github.com/anthropics/anthropic-quickstarts.git
cd anthropic-quickstarts\agents
pip install anthropic mcp
jupyter notebook agent_demo.ipynb
````

Note : `computer-use-best-practices/` est macOS-only. Sur Windows, viser `computer-use-demo/` (Docker) ou `browser-use-demo/` (Docker).
</script>

<script id="src-verdict" type="text/markdown">
# VERDICT PM — anthropics/anthropic-quickstarts

## Note globale : 9/10

Repo officiel Anthropic. Référence canonique pour "comment Anthropic veut qu'un projet démarre". À traiter comme source de vérité.

## Points forts

1. **Modularité parfaite** : 7 quickstarts isolés, aucun couplage, démarrables indépendamment.
2. **README discipline** : chaque sous-projet a son README autonome, structure quasi-identique (Overview → Prerequisites → Quick Start → Structure → License).
3. **Friction minimale** : 3 commandes max pour démarrer (install → API key → run).
4. **Pattern PWF natif** : `autonomous-coding` formalise la persistance disque (feature_list.json + claude-progress.txt + git) — c'est l'origine officielle du pattern "Planning With Files".
5. **`.claude/skills/first-run/`** : le seul exemple Anthropic-officiel de skill embarqué dans un projet user. C'est LA référence pour SKILL.md.
6. **Defense-in-depth** : security.py + allowlist bash + sandbox-exec + filesystem restrictions. Pattern reproductible.
7. **Config-as-code** : `config.example.toml` + env vars `CU_*` overlay. Pattern propre, sans `settings.json` hardcodé.

## Points faibles

1. **Pas de `.claude/settings.json` racine** : aucun pattern de configuration projet-level pour Claude Code. Le seul usage de `.claude/` est pour les skills.
2. **CLAUDE.md racine privé** : marqué "Internal Anthropic use" → non reproductible verbatim. Limite la valeur pédagogique.
3. **Hétérogénéité Python/TS** : pas de cohérence inter-projets sur le choix de stack (assumé, mais complique le mimétisme).
4. **Pas de hooks Claude Code** : aucun exemple de `hooks/` dans le repo. Lacune pour qui cherche à automatiser.

## Usages recommandés pour le skill architecture-anthropic

1. **Template de SKILL.md** : copier la structure YAML frontmatter de `computer-use-best-practices/.claude/skills/first-run/SKILL.md`.
2. **Template de README quickstart** : reproduire la charpente Overview / Prerequisites / Quick Start / How It Works / Structure / Customization / Troubleshooting / License de `autonomous-coding/README.md`.
3. **Pattern persistance session** : reprendre le triptyque `feature_list.json` (immuable) + `claude-progress.txt` (passation) + git (historique).
4. **Pattern security sandbox** : reprendre `autonomous-coding/security.py` comme base d'allowlist bash.
5. **Pattern config layered** : reprendre `config.example.toml` + env var overlay au lieu de hardcoded settings.

## Verdict pertinence pour le skill : HAUT

C'est la référence Anthropic-officielle. À indexer en priorité dans le catalogue archi.

<script id="src-notes" type="text/markdown">
# NOTES — Patterns d'archi Anthropic-officiels (à appliquer)

Source : anthropics/anthropic-quickstarts (audit 2026-05-20)
Statut : référence canonique pour le layer "catalogue archi officielle"

## 1. Structure-type d'un quickstart Anthropic

Charpente minimale observée sur les 7 projets :

````
<quickstart-name>/
├── README.md              # OBLIGATOIRE
├── .env.example           # OBLIGATOIRE (si secrets requis)
├── .gitignore             # OBLIGATOIRE
├── requirements.txt       # Python : OBLIGATOIRE
│   OU package.json        # Node/TS : OBLIGATOIRE
├── <module>/              # code applicatif dans un sous-dossier nommé
├── tests/                 # OBLIGATOIRE si production-grade
├── prompts/               # OPTIONNEL — si l'agent a des prompts externalisés
└── setup.sh OU init.sh    # OPTIONNEL — script d'init one-shot
````

Pour les projets containerisés, ajouter :
````
├── Dockerfile
├── docker-compose.yml     # si multi-service
└── .dockerignore
````

Pour les projets Next.js (vitrine) :
````
├── app/                   # Next.js 14 App Router
├── components/            # shadcn/ui
├── lib/                   # utilitaires
├── components.json        # config shadcn/ui
├── tailwind.config.ts
├── tsconfig.json
└── next.config.mjs
````

## 2. Convention README de starter Anthropic

Sections obligatoires (ordre canonique observé sur autonomous-coding et computer-use-best-practices) :

1. **Titre + 1-liner descriptif**
2. **Overview / What it does** — paragraphe d'intention, mention explicite "reference implementation" si pédagogique
3. **Prerequisites** — versions Python/Node, SDK requis, permissions OS si pertinent
4. **Quick Start** — bloc `bash` complet : install → API key → run
5. **How It Works** — section conceptuelle, pas de code (architecture, agents, flow)
6. **Project Structure** — arborescence ASCII avec commentaires inline
7. **Security Model** — OBLIGATOIRE dès qu'il y a exécution de code ou contrôle système
8. **Command Line Options** — table markdown si CLI
9. **Customization** — comment modifier (prompts, allowlist, etc.)
10. **Troubleshooting** — Q/R des erreurs courantes
11. **License** — toujours en dernier

**Règle d'or observée** : le bloc Quick Start doit être copiable-collable et fonctionner sans contexte supplémentaire.

## 3. Configuration `.claude/` de référence

**Le seul exemple officiel** est `computer-use-best-practices/.claude/skills/first-run/SKILL.md`.

Structure :
````
.claude/
└── skills/
    └── <skill-name>/
        └── SKILL.md       # frontmatter YAML + corps markdown
````

Frontmatter canonique :
````yaml
---
name: <skill-name>
description: <action verb + concrete outcome + when-to-trigger hints>
---
````

Le corps est structuré en **phases numérotées** (Phase 1: Orientation, Phase 2: Environment Check, etc.) avec instructions concrètes par phase.

**Absence notable** : aucun `.claude/settings.json` projet-level dans tout le repo. Anthropic ne pousse PAS de pattern settings.json embarqué. La config Claude reste user-global.

## 4. Patterns d'init de projet (scripts, hooks, dépendances)

### Pattern A — `setup.sh` (computer-use-demo)
Script bash idempotent qui :
- crée venv
- installe deps + dev-requirements
- installe pre-commit hooks
- valide l'environnement

### Pattern B — `init.sh` généré par agent (autonomous-coding)
Script créé PAR l'agent initialiseur, jamais commité directement. Contient :
- install deps
- start services
- env config
- URL d'accès en commentaire

### Pattern C — `.pre-commit-config.yaml` racine (monorepo)
Hooks officiels Anthropic pour Python :
````yaml
- ruff (autofix lint)
- ruff format
- ruff lint check
- pyright (types)
- check-yaml, end-of-file-fixer, trailing-whitespace
````
Scopé via `files: ^<project>/`.

### Pattern D — `pyproject.toml` racine avec pyright scope
````toml
[tool.pyright]
venvPath = "<subproject>"
venv = ".venv"
useLibraryCodeForTypes = false
````
Permet de configurer un type-checker depuis la racine sur un sous-projet.

## 6. Pattern de persistance multi-session (origine PWF)

`autonomous-coding/` formalise le pattern :

````
Mémoire = trois fichiers + git
├── <spec>.txt              # immuable, source de vérité requirements
├── feature_list.json       # immuable côté descriptions, mutable côté pass/fail
├── claude-progress.txt     # passation entre sessions (notes libres)
└── .git/                   # historique implémentation + raisonnement
````

Protocole de reprise de session (canonique) :
1. `ls` + lecture des core docs
2. relire `claude-progress.txt`
3. `git log --oneline -20`
4. compter les features incomplètes
5. choisir LA prochaine feature
6. implémenter
7. commit + update progress + clean state avant terminate

C'est exactement le pattern PWF côté user, formalisé officiellement par Anthropic dans un quickstart.

## 7. Pattern security defense-in-depth

`autonomous-coding/security.py` + `client.py` :
- **Couche 1 OS** : sandbox bash isolation
- **Couche 2 FS** : opérations limitées au project dir
- **Couche 3 allowlist** : commandes autorisées explicitement (`ls`, `cat`, `head`, `tail`, `wc`, `grep`, `npm`, `node`, `git`, `ps`, `lsof`, `sleep`, `pkill`)
- **Couche 4 hook** : block automatique des commandes hors allowlist

Reproductible : copier `security.py` comme base, adapter la liste.

## 8. Pattern config-as-code (computer-use-best-practices)

Triptyque :
````
constants.py            # Config dataclass + cfg instance (defaults)
config.example.toml     # template TOML d'overrides
CU_<FIELD> env vars     # overrides ponctuels par variable
````
Préséance : env > toml > defaults.
Activation : `CU_CONFIG=config.toml python -m ...`

À reproduire pour tout projet ayant >5 paramètres de config.
