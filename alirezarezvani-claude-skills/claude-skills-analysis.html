# Récit — alirezarezvani/claude-skills

> Décodeur narratif · transmutation de l'analyse fmaths · 2026-05-26

---

## Le décor

Imaginez une armurerie de 329 pièces, chacune rangée par métier : une étagère pour l'ingénieur, une pour le product owner, une pour le directeur marketing, une pour le CFO. Chaque pièce est légère — un fichier SKILL.md, parfois accompagné d'un outil Python sans installation. On entre, on prend, on part. L'armurerie ne sait pas qui vous êtes ni dans quel ordre vous venez piocher.

C'est la force et la limite du projet.

---

## Les règles du jeu

> *"You combine them. The pattern is always the same."*

L'orchestration repose sur trois composantes : une **Persona** (qui êtes-vous, comment jugez-vous), des **Skills** (quelles armes prenez-vous), et des **Agents** (des combinaisons pré-configurées pour un domaine). Le protocole dit : un seul persona actif par prompt. Les skills, eux, s'empilent librement.

Quatre patterns de jeu émergent :
- **Solo Sprint** — vous jouez successivement CTO, PO, Founder. Chaque switch = un chapeau différent sur la même tête.
- **Domain Deep-Dive** — même persona, 5 skills chargés, plongée intensive.
- **Multi-Agent Handoff** — une persona relit le travail d'une autre. Contrôle qualité distribué.
- **Skill Chain** — aucun persona, séquence procédurale pure.

**Tension critique :** Le Solo Sprint est exactement le rêve du solo founder qui veut la stack de 50 personnes. Mais l'armurerie ne tient pas de registre des armes empruntées. Quand vous revenez le lendemain, vous recommencez à zéro.

---

## Le socle immuable

Trois choses ne bougent pas dans ce repo :

1. **Grain = 1 SKILL.md = 1 intention.** Pas de skills composites, pas de hiérarchie d'héritages. Chaque skill est atomique.
2. **Zéro dépendance externe.** Les 402 outils Python tournent avec la stdlib uniquement. Pas de pip, pas de virtualenv, pas de surprise à 23h.
3. **MIT.** Vous prenez, vous modifiez, vous redistribuez. Sans dette.

> ⚠️ Ce qui n'est **pas** immuable : la conformité frontmatter. Le repo ajoute des champs (`type`, `version`, `compatibility`) que le marketplace Anthropic officiel ne reconnaît pas. Si Claude Code fait évoluer son parser, ces skills peuvent casser silencieusement.

---

## Les leviers de transformation

Six leviers pour adapter ce repo à votre usage :

| Levier | Action | Gain |
|---|---|---|
| Sélection domaine | Ne charger que product-team + engineering | Réduire de 329 → ~40 skills actifs |
| Ajout LINEAGE.md | Un fichier par skill chargé | Traçabilité documentaire, nilpotence locale |
| Normalisation frontmatter | Réduire à name + description | Conformité Anthropic officielle |
| Personas Scrum | Créer PO / SM / Dev / Stakeholder / Dev Anthropic | Simuler l'équipe Scrum complète |
| Orchestration ↔ chaîne nilpotente | Mapper les phases sur R1→R4 | Convergence garantie MRD→Code |
| Spec day | Forcer TOUS les documents une fois | Remplir la chaîne avant le premier sprint |

---

## Les points de rupture

| Seuil | Si franchi |
|---|---|
| >20 skills actifs simultanément | Le signal se noie dans le bruit — persona switching devient du code-switching sans sens |
| 0 LINEAGE.md | Chaque session repart de zéro — le Solo Sprint devient Groundhog Day |
| Frontmatter étendu + mise à jour Claude Code | Skills silencieusement invisibles dans le marketplace |
| Orchestration sans DoR/DoD | Handoff sans critère de done = phase suivante commence sur du flou |

---

## Le chemin de moindre résistance

Pour Yanis, solo founder cherchant la stack de 50 personnes :

```
1. Installer le bundle product-team + engineering-team          (2 commandes)
2. Créer 5 personas : PO · SM · Dev · Stakeholder · DevAnthro  (1 après-midi)
3. Mapper les personas sur R1→R4 de la chaîne nilpotente        (1 session)
4. Ajouter LINEAGE.md à chaque skill chargé                     (1h par skill)
5. Spec day : invoquer PO pour MRD → BRD → PRD avant sprint 1   (1 journée)
```

Le repo vous donne les pièces. L'assemblage reste votre travail.

---

## L'équilibre du risque

Ce repo est une bibliothèque, pas un système. Sa valeur est dans sa **densité** (329 skills battle-tested, 16k étoiles) et son **absence de friction** (0 dépendance, MIT). Son risque principal n'est pas technique — il est architectural : charger 329 skills sans gouvernance produit du bruit, pas de la clarté.

**Pour le rêve "dreamteam solo" :** ce repo est un accélérateur de matière première. Il ne résout pas le problème du linéage, de la volatilité documentaire, ni du dashboard de convergence. Ces couches sont à construire par-dessus — et c'est exactement ce que fait le projet claude-prostheses.

> La bonne question n'est pas "est-ce que ce repo remplace la dreamteam ?" mais "quels skills de ce repo dois-je greffer sur quels personnages de ma matrice ?"

# Fmaths — alirezarezvani/claude-skills

> Analyse formelle 8 couches · Généré le 2026-05-26

---

## L0 — Ontologie (primitives non-redondantes)

| Primitive | Définition |
|---|---|
| **Skill** | Instruction exécutable encapsulée dans SKILL.md — grain = 1 intention |
| **Persona** | Identité + jugement — filtrent COMMENT un agent raisonne |
| **Agent** | Compositeur de Persona + Skills sur un domaine métier |
| **Tool** | Script Python stdlib (0 dépendance) attaché à un Skill |
| **Orchestration** | Protocole de coordination Persona ↔ Skills ↔ Agents entre phases |
| **Platform** | Cible de déploiement (Claude Code, Cursor, Gemini CLI, Aider…) |
| **Domain** | Cluster fonctionnel (engineering, product, marketing, c-level…) |

7 primitives. Fermées, non-redondantes, génératives.

---

## L1 — Ensembles et relations

```
Skill ∈ Domain
Domain ⊆ Agent (un agent agrège plusieurs domaines)
Persona → filtre(Agent)
Orchestration coordonne(Persona × Skills → Phase)
Tool est-attaché-à(Skill) [optionnel]
Platform consomme(Skill | Agent)

Skills : ~329  (répartis sur ~12 Domains)
Tools  : ~402  (stdlib Python uniquement)
Agents : ~10 composites (engineering, product, marketing…)
Personas : 3+ (Startup CTO, Growth Marketer, Solo Founder)
Platforms : 12+ (Claude Code, Cursor, Aider, Windsurf, Gemini CLI…)
```

**Relations critiques :**
- Skill ↛ Skill (pas de linéage entre skills — isolation forte)
- Persona ↛ Document (les personas ne produisent pas de traçabilité)
- Domain → SKILL.md (seul artefact persistant par skill)

---

## L2 — Logique et tensions

| Connecteur | Application |
|---|---|
| AND | Persona + Skills = agent opérationnel (les deux requis) |
| OR | Skills s'activent indépendamment (pas de dépendance inter-skill) |
| XOR | 1 persona active par prompt — exclusion mutuelle |
| → | Orchestration : Phase N → Hand Off → Phase N+1 |

**Tensions identifiées :**
- `T1` Skills sont **isolés** — aucun mécanisme de linéage entre eux. Viola A₅ traçabilité si on veut nilpotence globale.
- `T2` **329 skills** = richesse ET risque de dispersion. Sans filtre, le Solo Founder se noie.
- `T3` Orchestration est **procédurale** (Skill Chain) OU **opportuniste** (persona switching). Pas de garantie formelle de convergence.
- `T4` Platform-agnostic = force ET faiblesse : adaptation `convert.sh` déléguée à l'utilisateur.

---

## L3 — Invariants

| ID | Invariant |
|---|---|
| I1 | Chaque Skill = 1 SKILL.md — grain immuable |
| I2 | 0 dépendance externe pour les Tools (stdlib Python only) |
| I3 | 1 seule Persona active par prompt (exclusion mutuelle) |
| I4 | MIT License — réutilisation libre, modification libre |
| I5 | Context forward : lors d'un handoff, le contexte précédent se transmet |
| I6 | Skills stack freely — pas de conflit de charge possible |

---

## L4 — Axes de variation

| Axe | Min | Max | État actuel |
|---|---|---|---|
| Couverture domaines | 1 domain | 12+ domains | ✅ 12 domains couverts |
| Profondeur par skill | 1 ligne instruction | 50+ lignes + scripts | Mixte : léger→dense |
| Maturité orchestration | Ad hoc prompt | Protocole 5 étapes formalisé | ⚠️ v2.8.4, récent |
| Conformité Anthropic | Non-conforme | name+description seulement | ⚠️ frontmatter étendu (non-standard) |
| Linéage documentaire | 0 (actuel) | LINEAGE.md par skill | ❌ absent |
| Support multi-platform | Claude Code only | 12 plateformes | ✅ via convert.sh |

---

## L5 — Seuils et stabilité

| Seuil | Valeur critique | Risque |
|---|---|---|
| Surcharge cognitive | >20 skills actifs simultanément | Persona switching becomes noise |
| Breaking changes | ~10 releases/mois observés | Pins de version nécessaires |
| Conformité frontmatter | Champs supplémentaires (type, version…) | Incompatibilité avec marketplace Anthropic officiel |
| Linéage manquant | 0 skills avec LINEAGE.md | Opacité totale du DAG de provenance |
| Onboarding friction | `/plugin install` → 1 commande | ✅ sous le seuil d'abandon |

---

## L6 — Catégories (cohérence interne)

| Couche | Contenu | Couplage |
|---|---|---|
| Instruction | SKILL.md + frontmatter | ✅ découplé par design |
| Exécution | Python Tools (~402) | ✅ stdlib-only, 0 coupling |
| Identité | Personas (3+) | ⚠️ peu documentées |
| Coordination | Orchestration protocol | ⚠️ récent, en évolution |
| Déploiement | Platform scripts | ✅ isolé dans scripts/ |
| Gouvernance | Standards/, templates/ | ⚠️ partiellement formalisé |

Audit couplages : Skills ↔ Tools = ✅ faible / Personas ↔ Skills = ⚠️ implicite / Orchestration ↔ Domaines = ⚠️ non formalisé

---

## L7 — Topologie (chemin de moindre résistance)

**Happy path :**
```
1. /plugin install engineering-skills@claude-code-skills      (30s)
2. Choisir une Persona dans agents/personas/                  (1 min)
3. Invoquer /skill domain/skill-name                          (immédiat)
4. Si cross-domain → orchestration/ORCHESTRATION.md           (5 min lecture)
5. Solo Sprint : CTO → PO → Founder (switch persona)          (par phase)
```

**Nœuds de friction :**
- F1 : 329 skills → sélection non guidée (pas de recommandation par cas d'usage)
- F2 : Frontmatter étendu → incompatibilité potentielle avec Claude Code marketplace officiel
- F3 : Orchestration sans linéage → handoff perd la traçabilité documentaire
- F4 : Windows : `convert.sh` est bash → nécessite WSL ou Git Bash

---

## L8 — Probabilités

| Dimension | Estimation | Source |
|---|---|---|
| P(lock-in plateforme) | 15% | MIT + multi-platform, faible |
| P(breaking change impactant) | 40%/mois | ~10 releases récentes, actif |
| P(adoption communauté) | 85% maintenu | 16.2k ★, 2.2k forks, 4 issues |
| P(conformité Anthropic officielle) | 30% tel quel | Frontmatter non-standard |
| P(nilpotence globale sans refactor) | 5% | Linéage absent, pas de chaîne formelle |

**Vecteur cognitif — bilan :**
- Abstraction : ✅ fort (Personas, Orchestration bien abstraits)
- Concrétude : ✅ très fort (402 outils Python concrets, exemples d'usage)
- Affect : ⚠️ absent (pas de signal émotionnel/motivation dans les skills)
- Normativité : ⚠️ implicite (pas de DoR/DoD, pas de critères de done formels)
- Incertitude : ⚠️ non signalée (aucun "⚠️" dans les skills eux-mêmes)
- Altérité : ✅ fort (12 plateformes, multi-rôles, multi-domaines)
- Cohérence : ⚠️ partielle (orche. récent, linéage absent, frontmatter non-standard)

# Installation — alirezarezvani/claude-skills

> Guide d'installation OS-specific · Windows PowerShell · 2026-05-26

---

## Prérequis

| Outil | Version min | Vérification |
|---|---|---|
| Python | 3.8+ | `python --version` |
| Git | 2.x | `git --version` |
| Claude Code | dernière | `claude --version` |
| Node.js (optionnel) | 18+ | `node --version` (pour convert.sh via Node) |

---

## Option A — Installation rapide via Plugin (Claude Code)

```bash
# Installer le bundle complet
/plugin marketplace add alirezarezvani/claude-skills

# Ou installer un bundle spécifique
/plugin install product-team@claude-code-skills
/plugin install engineering-skills@claude-code-skills
```

> ✅ Méthode recommandée. Aucune commande système requise.

---

## Option B — Depuis le repo source (pour contribuer ou modifier)

```powershell
# 1. Cloner
git clone https://github.com/alirezarezvani/claude-skills.git
cd claude-skills

# 2. Placer les skills dans Claude Code
# Windows PowerShell :
$skillsDir = "$env:USERPROFILE\.claude\skills"
New-Item -ItemType Directory -Force -Path $skillsDir

# Copier le bundle product-team
Copy-Item -Recurse -Force ".\product-team\*" "$skillsDir\"

# Copier le bundle engineering
Copy-Item -Recurse -Force ".\engineering\*" "$skillsDir\"
```

---

## Config minimale

Les skills ne nécessitent pas de fichier de configuration. L'activation se fait via frontmatter SKILL.md.

Pour les **Personas**, placer dans :
```
~/.claude/skills/personas/
```

Pour les **Agents composites**, placer dans :
```
~/.claude/skills/agents/
```

---

## Commandes de vérification

```bash
# Vérifier que les skills sont visibles dans Claude Code
/skills list

# Tester un skill product-team
/skill product-team/agile-product-owner

# Tester un outil Python (exemple)
python product-team/skills/agile-product-owner/scripts/story_generator.py --help
```

---

## Points d'attention Windows

> ⚠️ **convert.sh** — Le script de conversion multi-platform est bash. Sur Windows :
> - Option 1 : WSL (`wsl bash convert.sh --tool cursor`)
> - Option 2 : Git Bash (`"C:\Program Files\Git\bin\bash.exe" convert.sh --tool cursor`)
> - Option 3 : Ignorer convert.sh si vous utilisez uniquement Claude Code

> ⚠️ **Encodage** — Les SKILL.md contiennent des caractères UTF-8. Si PowerShell affiche des symboles corrompus : `[Console]::OutputEncoding = [System.Text.Encoding]::UTF8`

> ⚠️ **Chemins longs** — Si git clone échoue sur Windows : activer les long paths via `git config --global core.longpaths true`

# Verdict PM — alirezarezvani/claude-skills

> Score 3 dimensions · Forces/Risques · Matrice use cases · 2026-05-26  
> Lens d'évaluation : vision "dreamteam solo" + matrice rôle × étapes × bucket

---

## Score 3 dimensions

| Dimension | Score | Justification |
|---|---|---|
| **Pertinence vision dreamteam** | 7.5/10 | product-team + engineering-team + orchestration = 3/5 rôles Scrum couverts. Linéage absent = frein majeur. |

| | Titre | Description |
|---|---|---|
| ✅ | **Densité sans précédent** | 329 skills couvrant 12 domaines — aucun repo communautaire comparable en profondeur |
| ✅ | **Zéro friction runtime** | 402 outils Python stdlib-only — fonctionne sur n'importe quelle machine sans setup |

| | Titre | Impact |
|---|---|---|
| ⚠️ | **0 LINEAGE.md** | Chaque session repart à zéro. Le linéage "chaque doc prend sa source du précédent" est absent. Frein direct à la nilpotence globale. |
| ⚠️ | **Frontmatter non-standard** | Champs `type`, `version`, `compatibility` étendus. Incompatibilité potentielle avec marketplace Anthropic officiel futur. |
| ⚠️ | **329 sans filtre = bruit** | Sans gouvernance d'activation, le solo founder charge trop → signal/bruit défavorable |
| ⚠️ | **Breaking changes fréquents** | ~10 releases/mois. Pins de version obligatoires pour stabilité. |
| ❌ | **Conformité Anthropic partielle** | Pas de LINEAGE.md, frontmatter étendu, 0 DAG source→serve. "Coder sans linéage = artefact jetable" (miroir du miroir). |

---

## Matrice Use Cases

### ✅ Oui — Usage approprié

| Use case | Pourquoi |
|---|---|
| Greffer Agile PO + PM Toolkit sur la prothèse PM existante | Skills directement utilisables comme enrichissement du pm_context.py |
| Solo Sprint : PO → Dev → SM → Review en une journée | Orchestration native conçue pour ce pattern exact |
| Spec day forcé : MRD → BRD → PRD via Product Strategist | OKR cascade + PRD templates disponibles |
| Démarrer un nouveau projet avec la dreamteam Scrum | product-team (R1-R3) + engineering-team (R3-R4) = couverture complète |

### ❌ Attendre / Non — Usage inapproprié

| Use case | Pourquoi |
|---|---|
| Remplacer pm_context.py tel quel | Skills sans linéage = pas de convergence garantie MRD→Code |
| Utiliser comme source de vérité documentaire | 0 dashboard de volatilité, 0 historique de modification |
| Déployer en production sans pin de version | ~10 releases/mois = instabilité garantie si non-épinglé |

| Feature | Statut | Impact pour vision |

| AEO (Answer Engine Optimization) v2.7.3 | ✅ Livré | Marketing avancé |

| Dashboard de volatilité | ❌ Non roadmapé | Gap critique — à construire dessus |
| Conformité frontmatter Anthropic standard | ❌ Non roadmapé | À normaliser si adoption marketplace |

---

## Recommandation finale

**Pourquoi c'est pertinent maintenant :**  
Ce repo est la bibliothèque de skills la plus dense disponible pour Claude Code. Pour la vision "dreamteam solo de 5 rôles Scrum + Dev Anthropic", il offre immédiatement : Agile Product Owner (R3), PM Toolkit (R1-R2), Product Strategist (R1), Engineering Team (R3-R4). L'orchestration Solo Sprint est exactement le pattern de simulation de collègues voulu. 16k étoiles valident la pertinence communautaire.

**Action recommandée :**  
Ne pas importer en masse. Stratégie chirurgicale : (1) extraire 5-6 skills ciblés de product-team + engineering alignés sur la chaîne nilpotente R1→R4, (2) les greffer sur les personas existants (pm/SKILL.md, indie-dev/SKILL.md), (3) ajouter un LINEAGE.md par skill greffé pour rétablir la traçabilité. Le repo est de la matière première excellente — l'assemblage gouverné reste à faire dans claude-prostheses. **MVP : Agile PO + PM Toolkit + Engineering → personas Scrum = 3 rôles en 1 journée.**

<script>
function switchTab(name, btn) {
  document.querySelectorAll('.content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

function renderMd(srcId, targetId) {
  var src = document.getElementById(srcId).textContent;
  document.getElementById(targetId).innerHTML = marked.parse(src);
}

renderMd('md-recit', 'tab-recit');
renderMd('md-fmaths', 'tab-fmaths');
renderMd('md-install', 'tab-install');
renderMd('md-verdict', 'tab-verdict');
